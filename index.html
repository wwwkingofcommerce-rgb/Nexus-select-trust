<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Nexus Select Trust Ticker</title>
<style>
  body {
    font-family: monospace;
    background-color: #0a0a0a;
    color: #fff;
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }
  .ticker-container {
    background-color: #111;
    border: 1px solid #222;
    padding: 40px;
    border-radius: 16px;
    width: 100%;
    max-width: 450px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.7);
  }
  .label {
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #888;
    margin-bottom: 10px;
  }
  .live-value {
    font-size: 42px;
    font-weight: bold;
    color: #00ff66;
    text-shadow: 0 0 20px rgba(0,255,102,0.3);
    margin-bottom: 30px;
    font-variant-numeric: tabular-nums;
  }
  .control-panel {
    background-color: #161616;
    padding: 20px;
    border-radius: 8px;
    border: 1px solid #252525;
  }
  .input-wrapper {
    margin-bottom: 15px;
  }
  input {
    width: 100%;
    padding: 12px;
    background-color: #222;
    border: 1px solid #333;
    color: #fff;
    border-radius: 6px;
    box-sizing: border-box;
    font-family: monospace;
    font-size: 16px;
    text-align: center;
  }
  input:focus {
    outline: none;
    border-color: #00ff66;
  }
  .btn-group {
    display: flex;
    gap: 10px;
  }
  button {
    flex: 1;
    padding: 12px;
    border: none;
    border-radius: 6px;
    font-family: monospace;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn-add {
    background-color: #00ff66;
    color: #000;
  }
  .btn-add:hover {
    background-color: #00dd55;
  }
  .btn-less {
    background-color: #ff3333;
    color: #fff;
  }
  .btn-less:hover {
    background-color: #dd2222;
  }
</style>
</head>
<body>

<div class="ticker-container">
  <div class="label">Live Investment Value (10%/yr)</div>
  <div class="live-value" id="counter">₹0.000000</div>
  
  <div class="control-panel">
    <div class="input-wrapper">
      <input type="number" id="amount" placeholder="Enter Amount (₹)" value="1000">
    </div>
    <div class="btn-group">
      <button class="btn-add" onclick="modifyInvestment(true)">+ Add</button>
      <button class="btn-less" onclick="modifyInvestment(false)">- Less</button>
    </div>
  </div>
</div>

<script>
  const initialUnits = 29;
  const initialPrice = 163;
  let currentPrincipal = localStorage.getItem('nexus_principal') 
    ? parseFloat(localStorage.getItem('nexus_principal')) 
    : initialUnits * initialPrice;

  const annualRate = 0.10;
  const msPerYear = 365 * 24 * 60 * 60 * 1000;
  let lastUpdateTime = Date.now();

  function updateTicker() {
    const now = Date.now();
    const elapsedMs = now - lastUpdateTime;
    lastUpdateTime = now;

    const ratePerMs = annualRate / msPerYear;
    currentPrincipal = currentPrincipal * Math.exp(ratePerMs * elapsedMs);
    
    localStorage.setItem('nexus_principal', currentPrincipal);
    document.getElementById('counter').innerText = '₹' + currentPrincipal.toFixed(6);
  }

  function modifyInvestment(isAddition) {
    const inputElement = document.getElementById('amount');
    const value = parseFloat(inputElement.value) || 0;
    
    if (isAddition) {
      currentPrincipal += value;
    } else {
      currentPrincipal -= value;
      if (currentPrincipal < 0) currentPrincipal = 0;
    }
    
    localStorage.setItem('nexus_principal', currentPrincipal);
    lastUpdateTime = Date.now();
    document.getElementById('counter').innerText = '₹' + currentPrincipal.toFixed(6);
    inputElement.value = '';
  }

  setInterval(updateTicker, 50);
</script>

</body>
</html>
